# OpenProject
# Use Docker's internal DNS resolver for dynamic resolution
server {
    listen 80;
    server_name openproject.local.info;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $backend "http://openproject:80";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (OpenProject may use it)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;

        # Allow large request bodies (for file uploads)
        client_max_body_size 100M;
    }
}
