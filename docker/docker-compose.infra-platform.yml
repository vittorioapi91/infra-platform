services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../storage-infra/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=2014
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
    volumes:
      - ../storage-infra/grafana/data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # Optional: MLflow tracking server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    container_name: mlflow
    ports:
      - "55000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - ../storage-infra/mlflow/data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    networks:
      - monitoring
    restart: unless-stopped

  # Optional: Feast CLI / feature store
  feast:
    image: python:3.11-slim
    container_name: feast
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      - FEAST_REPO_PATH=/workspace/feast/feast_repo
    command: >
      bash -c "pip install 'feast[local]>=0.36.0' && cd $$FEAST_REPO_PATH && feast apply && tail -f /dev/null"
    networks:
      - monitoring
    restart: unless-stopped

  # Airflow DEV (for dev/* branches)
  airflow-dev:
    image: apache/airflow:2.9.3
    container_name: airflow-dev
    ports:
      - "8082:8080"
    mem_limit: 4g
    mem_reservation: 1g
    cpus: 2.0
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      # Use PostgreSQL instead of SQLite for better performance and concurrency
      # Connect directly to postgres-ta-dev; database datalake, schema postgres (nginx proxy used for host access)
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dev.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-dev:5432/datalake?options=-c%20search_path%3Dpostgres
      # Use FAB auth manager so 'airflow users create' controls login
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.auth.managers.fab.fab_auth_manager.FabAuthManager
      - AIRFLOW__WEBSERVER__RATELIMIT_STORAGE_URI=redis://redis:6379/1
      # Use 1 worker for webserver to reduce resource contention (scheduler runs separately)
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=30
      - AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC=5
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=5
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=180
      # Display environment badge in Airflow UI title
      - AIRFLOW__WEBSERVER__INSTANCE_NAME=Airflow (DEV)
      # Make custom operators available inside the container
      - PYTHONPATH=/opt/airflow/operators
      # Set environment for config.py and wheel selection
      - AIRFLOW_ENV=dev
      - GIT_BRANCH=${GIT_BRANCH:-dev}
      # PostgreSQL (direct to postgres-ta-dev; database datalake, default schema postgres)
      - POSTGRES_HOST=postgres-ta-dev
      - POSTGRES_PORT=5432
      - POSTGRES_USER=dev.user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
      - POSTGRES_DB=datalake
      - POSTGRES_SCHEMA=postgres
    volumes:
      - ../storage-infra/airflow/dev/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      # Mount custom operators package
      - ../airflow/operators:/opt/airflow/operators
      # Wheels and workspace in storage-infra (not versioned)
      - ../storage-infra/airflow/dev/wheels:/opt/airflow/wheels
      - ../storage-infra/airflow/dev/workspace:/opt/airflow/workspace
      # DAGs stay versioned in airflow
      - ../airflow/dev/dags:/opt/airflow/dags
      # Mount install-trading_agent-wheel.sh script for automatic wheel installation
      - ../airflow/install-trading_agent-wheel.sh:/opt/airflow/install-trading_agent-wheel.sh:ro
      # Mount create-dag-imports.sh script for creating single DAG import file
      - ../airflow/create-dag-imports.sh:/opt/airflow/create-dag-imports.sh:ro
      # Mount TradingPythonAgent to access built wheels and allow writing data files
      # (writable so DAGs can write to src/fundamentals/edgar/, etc.)
      - ../../TradingPythonAgent:/workspace/trading-agent
      # Bind-mount storage-other-data from host (<repo>/storage-other-data); not in any image. DAGs write to /workspace/storage-other-data/ta/{env}
      - ../storage-other-data:/workspace/storage-other-data
      # Mount infra-platform root to access .env.tradingAgent.{env} files (read-only)
      - ..:/workspace/infra-platform:ro
      # Mount airflow_local_settings for UI alerts/banner
      - ../airflow/airflow_local_settings.py:/opt/airflow/airflow_local_settings.py:ro
      # Mount Docker socket to enable container restart from within
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../storage-infra/airflow/dev/db:/opt/airflow
    command: >
      bash -c "
        # Run install-trading_agent-wheel.sh automatically to copy wheels from TradingPythonAgent/dist/ to /opt/airflow/wheels/
        ENV=dev
        echo \"Running install-trading_agent-wheel.sh to copy wheels from TradingPythonAgent/dist/...\"
        # Set TRADING_AGENT_ROOT environment variable for install-trading_agent-wheel.sh
        export TRADING_AGENT_ROOT=/workspace/trading-agent
        # Run install-trading_agent-wheel.sh (will copy wheel if it exists in TradingPythonAgent/dist/)
        bash /opt/airflow/install-trading_agent-wheel.sh \$${ENV} 2>&1 || {
          echo \"Warning: install-trading_agent-wheel.sh failed or no wheel found in TradingPythonAgent/dist/\"
          echo \"  This is OK if wheels are already in /opt/airflow/wheels/ or will be added manually\"
        }
        # Install environment-specific wheel (dev)
        # Wheels are now named with base package name (no env suffix): trading_agent-*.whl
        # Find the latest version by sorting all matching wheels by version (-V) and taking the last one
        WHEEL_FILE=\$$(find /opt/airflow/wheels -name "trading_agent-*.whl" 2>/dev/null | sort -V | tail -n 1)
        if [ -n \"\$${WHEEL_FILE}\" ]; then
          echo \"Found wheel: \$$(basename \$${WHEEL_FILE})\"
          # Extract package name from wheel file
          PACKAGE_NAME=\$$(python3 -c \"import zipfile,re;f=zipfile.ZipFile('${WHEEL_FILE}');m=[n for n in f.namelist() if '.dist-info/METADATA' in n];metadata=f.read(m[0]).decode('utf-8') if m else '';r=re.search(r'^Name:\\s*(.+)$',metadata,re.MULTILINE) if metadata else None;print(r.group(1).strip() if r else 'trading_agent');f.close()\" 2>/dev/null || echo \"trading_agent\")
          
          # Workspace directory: /opt/airflow/workspace/{package_name}-workspace (mounted from storage-infra/airflow/dev/workspace)
          WORKSPACE_DIR=\"/opt/airflow/workspace/\$${PACKAGE_NAME}-workspace\"
          # Installation directory: workspace/{package_name}-workspace (wheel already contains package structure)
          INSTALL_DIR=\"\$${WORKSPACE_DIR}\"
          
          # Determine environment file name for checking
          ENV_FOR_ENV_FILE=\$${ENV}
          
          # Check if package is already installed or installation is in progress
          # Since wheel doesn't change, we only need to install once
          INSTALL_LOCK=\"\$${WORKSPACE_DIR}/.wheel_install.lock\"
          ENV_FILE_DEST=\"\$${WORKSPACE_DIR}/.env.\$${ENV_FOR_ENV_FILE}\"
          NEEDS_INSTALL=false
          
          # Check for lock file (installation in progress)
          if [ -f \"\$${INSTALL_LOCK}\" ]; then
            LOCK_AGE=\$$(find \"\$${INSTALL_LOCK}\" -mmin +30 2>/dev/null && echo \"old\" || echo \"recent\")
            if [ \"\$${LOCK_AGE}\" = \"old\" ]; then
              # Lock file is old (stale), remove it and proceed
              rm -f \"\$${INSTALL_LOCK}\"
              echo \"Stale lock file removed. Will install wheel \$$(basename \$${WHEEL_FILE})\"
              NEEDS_INSTALL=true
            else
              echo \"Installation in progress (lock file exists). Skipping installation.\"
              NEEDS_INSTALL=false
            fi
          # Check for .env file (installation completed)
          elif [ -f \"\$${ENV_FILE_DEST}\" ]; then
            echo \"Workspace .env file exists. Skipping installation (wheel hasn't changed).\"
            NEEDS_INSTALL=false
          # Check for dist-info (package installed)
          else
            DIST_INFO=\$$(find \"\$${WORKSPACE_DIR}\" -maxdepth 1 -type d -name \"\$${PACKAGE_NAME}*.dist-info\" 2>/dev/null | head -1)
            if [ -n \"\$${DIST_INFO}\" ] && [ -f \"\$${DIST_INFO}/METADATA\" ]; then
              INSTALLED_VERSION=\$$(grep -E \"^Version:\" \"\$${DIST_INFO}/METADATA\" 2>/dev/null | sed 's/Version:[[:space:]]*//' | head -1 || echo \"\")
              echo \"Package already installed (version \$${INSTALLED_VERSION}). Skipping installation.\"
              NEEDS_INSTALL=false
            else
              echo \"Package not installed. Will install wheel \$$(basename \$${WHEEL_FILE})\"
              NEEDS_INSTALL=true
            fi
          fi
          
          if [ \"\$${NEEDS_INSTALL}\" = \"true\" ]; then
            echo \"Installing wheel: \$$(basename \$${WHEEL_FILE})\"
            echo \"Workspace directory: \$${WORKSPACE_DIR}\"
            echo \"Package installation directory: \$${INSTALL_DIR}\"
            # Create workspace directory if it doesn't exist
            mkdir -p \"\$${WORKSPACE_DIR}\"
            # Create lock file to indicate installation is in progress
            touch \"\$${INSTALL_LOCK}\"
            # Only clean up if workspace is truly empty (not if it has files from previous install)
            if [ \"\$$(ls -A \$${WORKSPACE_DIR} 2>/dev/null | wc -l)\" -le 2 ]; then
              echo \"Workspace is empty. Proceeding with installation.\"
            else
              echo \"Workspace has files. Keeping existing installation and updating.\"
            fi
            # Step 1: Install dependencies first to workspace root
            echo \"Step 1: Installing dependencies to workspace...\"
            # Extract dependencies from wheel metadata and write to temp file (handles long lists better)
            # Pass WHEEL_FILE directly to Python using command-line argument approach
            python3 -c \"import zipfile,re,sys;wheel_file='\$${WHEEL_FILE}';f=zipfile.ZipFile(wheel_file) if wheel_file else None;m=[n for n in f.namelist() if 'METADATA' in n or n.endswith('.dist-info/METADATA')] if f else [];metadata=f.read(m[0]).decode('utf-8') if m else '';deps=[line.replace('Requires-Dist: ','').split(';')[0].strip().split('(')[0].strip() for line in metadata.split('\\n') if line.startswith('Requires-Dist:') and 'extra ==' not in line] if metadata else [];print('\\n'.join(deps));f.close() if f else None\" > /tmp/dependencies.txt 2>/dev/null || echo \"\" > /tmp/dependencies.txt
            if [ -s /tmp/dependencies.txt ]; then
              DEP_COUNT=\$$(wc -l < /tmp/dependencies.txt | tr -d ' ')
              echo \"Found \$${DEP_COUNT} dependencies to install\"
              echo \"Installing dependencies to workspace...\"
              timeout 600 pip install --no-cache-dir --target \"\$${WORKSPACE_DIR}\" -r /tmp/dependencies.txt 2>&1 | grep -E \"(Installing|Successfully|ERROR|error|Failed|Warning:|already satisfied)\" | tail -10 || {
                echo \"Warning: Some dependencies failed to install, continuing with wheel installation\"
              }
              echo \"✓ Dependencies installation completed\"
            else
              echo \"No dependencies found in wheel metadata\"
            fi
            rm -f /tmp/dependencies.txt
            # Step 2: Install wheel package to workspace root (wheel already contains package structure)
            echo \"Step 2: Installing wheel package to \$${INSTALL_DIR}...\"
            mkdir -p \"\$${INSTALL_DIR}\"
            timeout 300 pip install --quiet --no-cache-dir --target \"\$${INSTALL_DIR}\" --no-deps \$${WHEEL_FILE} 2>&1 || {
              echo \"Warning: Failed to install wheel \$$(basename \$${WHEEL_FILE}) to \$${INSTALL_DIR}, continuing anyway\"
            }
            echo \"✓ Wheel installation completed for: \$$(basename \$${WHEEL_FILE})\"
            # Remove lock file and copy .env file to workspace root so config.py can find it
            rm -f \"\$${INSTALL_LOCK}\"
            # .env files are now in infra-platform root as .env.tradingAgent.{env}
            # ENV_FOR_ENV_FILE already set above
            # Primary: Try infra-platform root (new location)
            ENV_FILE_SOURCE=\"/workspace/infra-platform/.env.tradingAgent.\$${ENV_FOR_ENV_FILE}\"
            ENV_FILE_DEST=\"\$${WORKSPACE_DIR}/.env.\$${ENV_FOR_ENV_FILE}\"
            if [ ! -f \"\$${ENV_FILE_SOURCE}\" ]; then
              # Fallback: Try TradingPythonAgent location (legacy)
              ENV_FILE_SOURCE=\"/workspace/trading-agent/.env.\$${ENV_FOR_ENV_FILE}\"
            fi
            if [ -f \"\$${ENV_FILE_SOURCE}\" ]; then
              echo \"Copying .env file to workspace root...\"
              cp \"\$${ENV_FILE_SOURCE}\" \"\$${ENV_FILE_DEST}\"
              echo \"✓ Copied .env.\$${ENV_FOR_ENV_FILE} to workspace root\"
            else
              echo \"Warning: .env file not found at \$${ENV_FILE_SOURCE}\"
            fi
            # Run create-dag-imports.sh to create single DAG import file
            echo \"Running create-dag-imports.sh to create trading_agent_dags.py...\"
            # Pass package name to create-dag-imports.sh
            bash /opt/airflow/create-dag-imports.sh \$${ENV} \$${PACKAGE_NAME} 2>&1 || {
              echo \"Warning: create-dag-imports.sh failed or DAGs not found in installed wheel\"
            }
            else
              # Even if wheel isn't installed, ensure .env file is copied to workspace root
              # .env files are now in infra-platform root as .env.tradingAgent.{env}
              ENV_FOR_ENV_FILE=\$${ENV}
              # Primary: Try infra-platform root (new location)
              ENV_FILE_SOURCE=\"/workspace/infra-platform/.env.tradingAgent.\$${ENV_FOR_ENV_FILE}\"
              ENV_FILE_DEST=\"\$${WORKSPACE_DIR}/.env.\$${ENV_FOR_ENV_FILE}\"
              if [ ! -f \"\$${ENV_FILE_SOURCE}\" ]; then
                # Fallback: Try TradingPythonAgent location (legacy)
                ENV_FILE_SOURCE=\"/workspace/trading-agent/.env.\$${ENV_FOR_ENV_FILE}\"
              fi
              if [ -f \"\$${ENV_FILE_SOURCE}\" ] && [ ! -f \"\$${ENV_FILE_DEST}\" ]; then
                echo \"Copying .env file to workspace root...\"
                cp \"\$${ENV_FILE_SOURCE}\" \"\$${ENV_FILE_DEST}\"
                echo \"✓ Copied .env.\$${ENV_FOR_ENV_FILE} to workspace root\"
              fi
              # Even if wheel isn't installed, run create-dag-imports.sh in case DAGs need updating
              echo \"Running create-dag-imports.sh to ensure DAGs are up to date...\"
              bash /opt/airflow/create-dag-imports.sh \$${ENV} \$${PACKAGE_NAME} 2>&1 || {
                echo \"Warning: create-dag-imports.sh failed or DAGs not found\"
              }
            fi
          
          # Store wheel info for plugin display
          export WHEEL_VERSION=\"\$$(basename \$${WHEEL_FILE})\"
          export INSTALLED_WHEEL=\$$(basename \$${WHEEL_FILE})
        else
            echo \"Warning: No wheel found for environment \$${ENV}. Looking for trading_agent-*.whl\"
          export WHEEL_VERSION=\"Not installed\"
        fi
        # Install PostgreSQL client tools (pg_dump, pg_restore, psql) for backup DAGs
        if ! command -v pg_dump > /dev/null 2>&1; then
          echo \"Installing PostgreSQL client tools...\"
          apt-get update -qq > /dev/null 2>&1 && apt-get install -y -qq postgresql-client > /dev/null 2>&1 || {
            echo \"Warning: Failed to install PostgreSQL client tools. Backup DAGs may not work.\"
          }
        fi
        # Install critical project dependencies needed for DAGs (run in background, don't block)
        # Also install docker package for container reboot functionality
        python3 -m pip install --quiet tqdm pandas psycopg2-binary requests python-dotenv docker > /tmp/pip_install.log 2>&1 &
        # Start Airflow services immediately (dependencies will install in background)
        # Remove stale PID files if they exist
        rm -f /opt/airflow/airflow-webserver.pid /opt/airflow/airflow-scheduler.pid
        airflow db migrate &&
        # Only create admin user if it doesn't exist (check first to avoid resetting)
        airflow users list | grep -q 'admin' || airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password 2014 || true
        # Create vittorioapi user if it doesn't exist (persist across restarts)
        airflow users list | grep -q 'vittorioapi' || airflow users create --username vittorioapi --firstname Vittorio --lastname API --role Admin --email vittorioapi@example.com --password 2014 || true
        airflow webserver --port 8080 &
        airflow scheduler
      "
    networks:
      - monitoring
    restart: unless-stopped

  # Airflow TEST (for test branch)
  airflow-test:
    image: apache/airflow:2.9.3
    container_name: airflow-test
    ports:
      - "8083:8080"
    mem_limit: 4g
    mem_reservation: 1g
    cpus: 2.0
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      # Use PostgreSQL instead of SQLite for better performance and concurrency
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://test.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-test:5432/datalake?options=-c%20search_path%3Dpostgres
      # Use FAB auth manager so 'airflow users create' controls login
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.auth.managers.fab.fab_auth_manager.FabAuthManager
      - AIRFLOW__WEBSERVER__RATELIMIT_STORAGE_URI=redis://redis:6379/2
      # Use 1 worker for webserver to reduce resource contention (scheduler runs separately)
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=30
      - AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC=5
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=5
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=180
      # Display environment badge in Airflow UI title
      - AIRFLOW__WEBSERVER__INSTANCE_NAME=Airflow (TEST)
      # Make custom operators available inside the container
      - PYTHONPATH=/opt/airflow/operators
      # Set environment for config.py and wheel selection
      - AIRFLOW_ENV=test
      - GIT_BRANCH=${GIT_BRANCH:-test}
      # PostgreSQL (postgres-ta-test; database datalake, default schema postgres)
      - POSTGRES_HOST=postgres-ta-test
      - POSTGRES_PORT=5432
      - POSTGRES_USER=test.user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
      - POSTGRES_DB=datalake
      - POSTGRES_SCHEMA=postgres
    volumes:
      - ../storage-infra/airflow/test/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      # Mount custom operators package
      - ../airflow/operators:/opt/airflow/operators
      # Wheels and package_root in storage-infra (not versioned)
      - ../storage-infra/airflow/test/wheels:/opt/airflow/wheels:ro
      - ../storage-infra/airflow/test/package_root:/opt/airflow/package_root
      # DAGs stay versioned in airflow
      - ../airflow/test/dags:/opt/airflow/dags
      # Mount TradingPythonAgent to access built wheels and allow writing data files
      # (writable so DAGs can write to src/fundamentals/edgar/, src/macro/, src/markets/, etc.)
      - ../../TradingPythonAgent:/workspace/trading-agent
      # Bind-mount storage-other-data from host (<repo>/storage-other-data); not in any image. DAGs write to /workspace/storage-other-data/ta/{env}
      - ../storage-other-data:/workspace/storage-other-data
      # Mount .env file for environment configuration (read-only)
      - ../../TradingPythonAgent/.env.test:/workspace/trading-agent/.env.test:ro
      # Mount airflow_local_settings for UI alerts/banner
      - ../airflow/airflow_local_settings.py:/opt/airflow/airflow_local_settings.py:ro
      # Mount Docker socket to enable container restart from within
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../storage-infra/airflow/test/db:/opt/airflow
    command: >
      bash -c "
        # Install environment-specific wheel (test)
        ENV=test
        # Note: setuptools converts hyphens to underscores, so trading_agent-test becomes trading_agent_test
        # Find the latest version by sorting all matching wheels by version (-V) and taking the last one
        WHEEL_FILE=\$$(find /opt/airflow/wheels -name "trading_agent_\$${ENV}-*.whl" -o -name "trading-agent-\$${ENV}-*.whl" 2>/dev/null | sort -V | tail -n 1)
        if [ -n \"\$${WHEEL_FILE}\" ]; then
          echo \"Installing wheel: \$$(basename \$${WHEEL_FILE})\"
          # Extract package name from wheel file
          PACKAGE_NAME=\$$(python3 -c \"import zipfile,re;f=zipfile.ZipFile('${WHEEL_FILE}');m=[n for n in f.namelist() if 'METADATA' in n or n.endswith('.dist-info/METADATA')];r=re.search(r'^Name:\\s*(.+)$',f.read(m[0]).decode('utf-8'),re.MULTILINE) if m else None;print(r.group(1).strip() if r else 'trading_agent');f.close()\" 2>/dev/null || echo \"trading_agent\")
          # Installation directory: /opt/airflow/package_root/{package_name} (mounted from storage-infra/airflow/test/package_root)
          INSTALL_DIR=\"/opt/airflow/package_root/\$${PACKAGE_NAME}\"
          # Install wheel to environment-specific directory in background with timeout to avoid blocking
          (timeout 30 pip install --quiet --no-cache-dir --target \"\$${INSTALL_DIR}\" \$${WHEEL_FILE} || echo \"Wheel install completed or timed out\") &
          # Copy .env file to package root so config.py can find it
          # config.py looks for .env at Path(__file__).parent.parent.parent, which is /opt/airflow/package_root/
          ENV_FOR_ENV_FILE=\$${ENV}
          ENV_FILE_SOURCE=\"/workspace/trading-agent/.env.\$${ENV_FOR_ENV_FILE}\"
          ENV_FILE_DEST=\"/opt/airflow/package_root/.env.\$${ENV_FOR_ENV_FILE}\"
          if [ -f \"\$${ENV_FILE_SOURCE}\" ]; then
            cp \"\$${ENV_FILE_SOURCE}\" \"\$${ENV_FILE_DEST}\"
            echo \"✓ Copied .env.\$${ENV_FOR_ENV_FILE} to package root\"
          fi
          # Store wheel info for plugin display
          export WHEEL_VERSION=\"\$$(basename \$${WHEEL_FILE})\"
          export INSTALLED_WHEEL=\$$(basename \$${WHEEL_FILE})
        else
            echo \"Warning: No wheel found for environment \$${ENV}. Looking for trading_agent-*.whl\"
          export WHEEL_VERSION=\"Not installed\"
        fi
        # Install critical project dependencies needed for DAGs (run in background, don't block)
        # Also install docker package for container reboot functionality
        python3 -m pip install --quiet tqdm pandas psycopg2-binary requests python-dotenv docker > /tmp/pip_install.log 2>&1 &
        # Start Airflow services immediately (dependencies will install in background)
        # Remove stale PID files if they exist
        rm -f /opt/airflow/airflow-webserver.pid /opt/airflow/airflow-scheduler.pid
        airflow db migrate &&
        # Only create admin user if it doesn't exist (check first to avoid resetting)
        airflow users list | grep -q 'admin' || airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password 2014 || true
        airflow webserver --port 8080 &
        airflow scheduler
      "
    networks:
      - monitoring
    restart: unless-stopped

  # Airflow PROD (for main branch)
  airflow-prod:
    image: apache/airflow:2.9.3
    container_name: airflow-prod
    ports:
      - "8084:8080"
    mem_limit: 4g
    mem_reservation: 1g
    cpus: 2.0
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      # Use PostgreSQL instead of SQLite for better performance and concurrency
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://prod.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-prod:5432/datalake?options=-c%20search_path%3Dpostgres
      # Use FAB auth manager so 'airflow users create' controls login
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.auth.managers.fab.fab_auth_manager.FabAuthManager
      - AIRFLOW__WEBSERVER__RATELIMIT_STORAGE_URI=redis://redis:6379/3
      # Use 1 worker for webserver to reduce resource contention (scheduler runs separately)
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=30
      - AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC=5
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=5
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=180
      # Display environment badge in Airflow UI title
      - AIRFLOW__WEBSERVER__INSTANCE_NAME=Airflow (PROD)
      # Make custom operators available inside the container
      - PYTHONPATH=/opt/airflow/operators
      # Set environment for config.py and wheel selection
      - AIRFLOW_ENV=prod
      - GIT_BRANCH=${GIT_BRANCH:-main}
      # PostgreSQL (postgres-ta-prod; database datalake, default schema postgres)
      - POSTGRES_HOST=postgres-ta-prod
      - POSTGRES_PORT=5432
      - POSTGRES_USER=prod.user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
      - POSTGRES_DB=datalake
      - POSTGRES_SCHEMA=postgres
    volumes:
      - ../storage-infra/airflow/prod/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      # Mount custom operators package
      - ../airflow/operators:/opt/airflow/operators
      # Wheels and package_root in storage-infra (not versioned)
      - ../storage-infra/airflow/prod/wheels:/opt/airflow/wheels:ro
      - ../storage-infra/airflow/prod/package_root:/opt/airflow/package_root
      # DAGs stay versioned in airflow
      - ../airflow/prod/dags:/opt/airflow/dags
      # Mount TradingPythonAgent to access built wheels and allow writing data files
      # (writable so DAGs can write to src/fundamentals/edgar/, src/macro/, src/markets/, etc.)
      - ../../TradingPythonAgent:/workspace/trading-agent
      # Bind-mount storage-other-data from host (<repo>/storage-other-data); not in any image. DAGs write to /workspace/storage-other-data/ta/{env}
      - ../storage-other-data:/workspace/storage-other-data
      # Mount .env file for environment configuration (read-only)
      - ../../TradingPythonAgent/.env.prod:/workspace/trading-agent/.env.prod:ro
      # Mount airflow_local_settings for UI alerts/banner
      - ../airflow/airflow_local_settings.py:/opt/airflow/airflow_local_settings.py:ro
      # Mount Docker socket to enable container restart from within
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../storage-infra/airflow/prod/db:/opt/airflow
    command: >
      bash -c "
        # Install environment-specific wheel (prod)
        ENV=prod
        # Note: setuptools converts hyphens to underscores, so trading_agent-prod becomes trading_agent_prod
        # Find the latest version by sorting all matching wheels by version (-V) and taking the last one
        WHEEL_FILE=\$$(find /opt/airflow/wheels -name "trading_agent_\$${ENV}-*.whl" -o -name "trading-agent-\$${ENV}-*.whl" 2>/dev/null | sort -V | tail -n 1)
        if [ -n \"\$${WHEEL_FILE}\" ]; then
          echo \"Installing wheel: \$$(basename \$${WHEEL_FILE})\"
          # Extract package name from wheel file
          PACKAGE_NAME=\$$(python3 -c \"import zipfile,re;f=zipfile.ZipFile('${WHEEL_FILE}');m=[n for n in f.namelist() if 'METADATA' in n or n.endswith('.dist-info/METADATA')];r=re.search(r'^Name:\\s*(.+)$',f.read(m[0]).decode('utf-8'),re.MULTILINE) if m else None;print(r.group(1).strip() if r else 'trading_agent');f.close()\" 2>/dev/null || echo \"trading_agent\")
          # Installation directory: /opt/airflow/package_root/{package_name} (mounted from storage-infra/airflow/prod/package_root)
          INSTALL_DIR=\"/opt/airflow/package_root/\$${PACKAGE_NAME}\"
          # Install wheel to environment-specific directory in background with timeout to avoid blocking
          (timeout 30 pip install --quiet --no-cache-dir --target \"\$${INSTALL_DIR}\" \$${WHEEL_FILE} || echo \"Wheel install completed or timed out\") &
          # Copy .env file to package root so config.py can find it
          # config.py looks for .env at Path(__file__).parent.parent.parent, which is /opt/airflow/package_root/
          ENV_FOR_ENV_FILE=\$${ENV}
          ENV_FILE_SOURCE=\"/workspace/trading-agent/.env.\$${ENV_FOR_ENV_FILE}\"
          ENV_FILE_DEST=\"/opt/airflow/package_root/.env.\$${ENV_FOR_ENV_FILE}\"
          if [ -f \"\$${ENV_FILE_SOURCE}\" ]; then
            cp \"\$${ENV_FILE_SOURCE}\" \"\$${ENV_FILE_DEST}\"
            echo \"✓ Copied .env.\$${ENV_FOR_ENV_FILE} to package root\"
          fi
          # Store wheel info for plugin display
          export WHEEL_VERSION=\"\$$(basename \$${WHEEL_FILE})\"
          export INSTALLED_WHEEL=\$$(basename \$${WHEEL_FILE})
        else
            echo \"Warning: No wheel found for environment \$${ENV}. Looking for trading_agent-*.whl\"
          export WHEEL_VERSION=\"Not installed\"
        fi
        # Install critical project dependencies needed for DAGs (run in background, don't block)
        # Also install docker package for container reboot functionality
        python3 -m pip install --quiet tqdm pandas psycopg2-binary requests python-dotenv docker > /tmp/pip_install.log 2>&1 &
        # Start Airflow services immediately (dependencies will install in background)
        # Remove stale PID files if they exist
        rm -f /opt/airflow/airflow-webserver.pid /opt/airflow/airflow-scheduler.pid
        airflow db migrate &&
        # Only create admin user if it doesn't exist (check first to avoid resetting)
        airflow users list | grep -q 'admin' || airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password 2014 || true
        airflow webserver --port 8080 &
        airflow scheduler
      "
    networks:
      - monitoring
    restart: unless-stopped

  # Six separate PostgreSQL servers – one per logical server (PMA dev/test/prod, TA dev/test/prod).
  # Accessible via nginx TCP proxy: postgres.{env}.{agent}.local.info:5432x (see gateway/nginx/nginx-postgres.stream.conf)

  # Postgres data: bind-mounted from <repo>/storage-postgresql/{dev|test|prod} (each may be a symlink to SSD). TA and PMA share these 3 instances.
  postgres-ta-dev:
    image: postgres:15
    container_name: postgres-ta-dev
    environment:
      - POSTGRES_USER=dev.tradingAgent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
    volumes:
      - ../storage-postgresql/dev:/var/lib/postgresql/data
    networks:
      - monitoring
    restart: unless-stopped

  postgres-ta-test:
    image: postgres:15
    container_name: postgres-ta-test
    environment:
      - POSTGRES_USER=test.tradingAgent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
    volumes:
      - ../storage-postgresql/test:/var/lib/postgresql/data
    networks:
      - monitoring
    restart: unless-stopped

  postgres-ta-prod:
    image: postgres:15
    container_name: postgres-ta-prod
    environment:
      - POSTGRES_USER=prod.tradingAgent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
    volumes:
      - ../storage-postgresql/prod:/var/lib/postgresql/data
    networks:
      - monitoring
    restart: unless-stopped

  # Prisma – manage PostgreSQL servers (node:20-slim for Prisma CLI compatibility; Alpine has "Invalid argument" issues)
  prisma-ta-dev:
    image: node:20-slim
    container_name: prisma-ta-dev
    ports:
      - "5555:5555"  # Prisma Studio – also reachable via http://localhost:5555
    working_dir: /workspace/prisma
    environment:
      - DATABASE_URL=postgresql://dev.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-dev:5432/datalake?options=-c%20search_path%3Dpostgres
    volumes:
      - ../prisma:/workspace/prisma
    command: sh -c "npm install && tail -f /dev/null"
    networks:
      - monitoring
    depends_on:
      - postgres-ta-dev
    restart: unless-stopped

  prisma-ta-test:
    image: node:20-slim
    container_name: prisma-ta-test
    ports:
      - "5556:5555"  # Prisma Studio – http://localhost:5556
    working_dir: /workspace/prisma
    environment:
      - DATABASE_URL=postgresql://test.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-test:5432/datalake?options=-c%20search_path%3Dpostgres
    volumes:
      - ../prisma:/workspace/prisma
    command: sh -c "npm install && tail -f /dev/null"
    networks:
      - monitoring
    depends_on:
      - postgres-ta-test
    restart: unless-stopped

  prisma-ta-prod:
    image: node:20-slim
    container_name: prisma-ta-prod
    ports:
      - "5557:5555"  # Prisma Studio – http://localhost:5557
    working_dir: /workspace/prisma
    environment:
      - DATABASE_URL=postgresql://prod.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-prod:5432/datalake?options=-c%20search_path%3Dpostgres
    volumes:
      - ../prisma:/workspace/prisma
    command: sh -c "npm install && tail -f /dev/null"
    networks:
      - monitoring
    depends_on:
      - postgres-ta-prod
    restart: unless-stopped

  prisma-pma-dev:
    image: node:20-slim
    container_name: prisma-pma-dev
    ports:
      - "5558:5555"  # Prisma Studio – http://localhost:5558
    working_dir: /workspace/prisma
    environment:
      # Same server as TA (postgres-ta-dev); database datalake, schema polymarket
      - DATABASE_URL=postgresql://dev.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-dev:5432/datalake?options=-c%20search_path%3Dpolymarket
    volumes:
      - ../prisma:/workspace/prisma
    command: sh -c "npm install && tail -f /dev/null"
    networks:
      - monitoring
    depends_on:
      - postgres-ta-dev
    restart: unless-stopped

  prisma-pma-test:
    image: node:20-slim
    container_name: prisma-pma-test
    ports:
      - "5559:5555"  # Prisma Studio – http://localhost:5559
    working_dir: /workspace/prisma
    environment:
      # Same server as TA (postgres-ta-test); database datalake, schema test.PredictionMarketsAgent
      - DATABASE_URL=postgresql://test.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-test:5432/datalake?options=-c%20search_path%3Dtest.PredictionMarketsAgent
    volumes:
      - ../prisma:/workspace/prisma
    command: sh -c "npm install && tail -f /dev/null"
    networks:
      - monitoring
    depends_on:
      - postgres-ta-test
    restart: unless-stopped

  prisma-pma-prod:
    image: node:20-slim
    container_name: prisma-pma-prod
    ports:
      - "5560:5555"  # Prisma Studio – http://localhost:5560
    working_dir: /workspace/prisma
    environment:
      # Same server as TA (postgres-ta-prod); database datalake, schema postgres
      - DATABASE_URL=postgresql://prod.user:${POSTGRES_PASSWORD:-2014}@postgres-ta-prod:5432/datalake?options=-c%20search_path%3Dpostgres
    volumes:
      - ../prisma:/workspace/prisma
    command: sh -c "npm install && tail -f /dev/null"
    networks:
      - monitoring
    depends_on:
      - postgres-ta-prod
    restart: unless-stopped

  # Redis for Airflow rate limiting backend
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - monitoring
    restart: unless-stopped

  # RedisInsight – web GUI for Redis (browse keys, run CLI, profile)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    volumes:
      - ../storage-infra/redisinsight/data:/data
    networks:
      - monitoring
    depends_on:
      - redis
    restart: unless-stopped

  # NATS messaging server
  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring endpoint
      - "6222:6222"  # Cluster routing (if needed)
    command:
      - "-js"  # Enable JetStream (persistent messaging)
      - "-m"   # Enable monitoring HTTP endpoint
      - "8222" # Monitoring port
      - "-sd"  # Store directory
      - "/data"
    volumes:
      - ../storage-infra/nats/data:/data
    networks:
      - monitoring
    restart: unless-stopped

  # OpenProject - Self-hosted project management (replacement for Jira)
  # Note: Update image tag if needed. Official images: openproject/community or openproject/openproject
  openproject:
    image: openproject/community:13
    container_name: openproject
    ports:
      - "8086:80"
    environment:
      - OPENPROJECT_SECRET_KEY_BASE=${OPENPROJECT_SECRET_KEY_BASE:-changeme-secret-key-base-change-in-production}
      - OPENPROJECT_HOST__NAME=${OPENPROJECT_HOST__NAME:-openproject.local.info}
      - OPENPROJECT_HTTPS=${OPENPROJECT_HTTPS:-false}
      - DATABASE_URL=postgres://openproject:${OPENPROJECT_DB_PASSWORD:-openproject}@openproject-postgres:5432/openproject
    volumes:
      # File uploads / attachments only; project list and work packages are in openproject-postgres
      - ../storage-infra/openproject/data:/var/openproject/assets
    networks:
      - monitoring
    depends_on:
      - openproject-postgres
    restart: unless-stopped

  # PostgreSQL database for OpenProject (projects, work packages, users live here—not in file folders)
  openproject-postgres:
    image: postgres:15
    container_name: openproject-postgres
    environment:
      - POSTGRES_USER=openproject
      - POSTGRES_PASSWORD=${OPENPROJECT_DB_PASSWORD:-openproject}
      - POSTGRES_DB=openproject
    volumes:
      # Keep this directory backed up; if empty/recreated, Postgres initializes a fresh DB and you lose projects
      - ../storage-infra/openproject-postgres/data:/var/lib/postgresql/data
    networks:
      - monitoring
    restart: unless-stopped

  # Nginx reverse proxy for all services
  # NOTE: No depends_on - nginx can start before backends and handle 502 errors gracefully
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"  # HTTP port for routing all domain names
      - "443:443"  # HTTPS port (if needed)
      # PostgreSQL TCP proxy – one port per logical server (see gateway/nginx/nginx-postgres.stream.conf)
      - "54324:54324"  # postgres.dev.local.info (TradingAgent dev)
      - "54325:54325"  # postgres.test.local.info (TradingAgent test)
      - "54326:54326"  # postgres.prod.local.info (TradingAgent prod)
    volumes:
      - ../gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro  # Custom nginx.conf with stream module
      - ../gateway/nginx/nginx-postgres.stream.conf:/etc/nginx/stream-postgres.conf:ro
      - ../gateway/nginx/nginx-jenkins.conf:/etc/nginx/conf.d/jenkins.conf:ro
      - ../gateway/nginx/nginx-airflow.conf:/etc/nginx/conf.d/airflow.conf:ro
      - ../gateway/nginx/nginx-grafana.conf:/etc/nginx/conf.d/grafana.conf:ro
      - ../gateway/nginx/nginx-prometheus.conf:/etc/nginx/conf.d/prometheus.conf:ro
      - ../gateway/nginx/nginx-redisinsight.conf:/etc/nginx/conf.d/redisinsight.conf:ro
      - ../gateway/nginx/nginx-nats.conf:/etc/nginx/conf.d/nats.conf:ro
      - ../gateway/nginx/nginx-openproject.conf:/etc/nginx/conf.d/openproject.conf:ro
      - ../gateway/nginx/nginx-prisma.conf:/etc/nginx/conf.d/prisma.conf:ro
      - ../gateway/nginx/nginx-mlflow.conf:/etc/nginx/conf.d/mlflow.conf:ro
      - ../gateway/nginx/nginx-kubernetes-dashboard.conf:/etc/nginx/conf.d/kubernetes-dashboard.conf:ro
      - ../gateway/nginx/nginx-kubeflow.conf:/etc/nginx/conf.d/kubeflow.conf:ro
      - ../gateway/nginx/nginx-portainer.conf:/etc/nginx/conf.d/portainer.conf:ro
      - ../gateway/nginx/nginx-pma-dashboard.conf:/etc/nginx/conf.d/pma-dashboard.conf:ro
    networks:
      monitoring:
        aliases:
          - postgres.dev.local.info
          - postgres.test.local.info
          - postgres.prod.local.info
    restart: unless-stopped

  # Jenkins CI/CD server (direct access, no nginx proxy for performance)
  jenkins:
    image: jenkins-custom:lts  # Custom image with kubectl, kind, and Docker CLI pre-installed
    container_name: jenkins
    ports:
      - "8081:8080"  # Jenkins on port 8081 (routed via nginx on port 80)
      - "50000:50000"
    mem_limit: 4g
    mem_reservation: 1g
    cpus: 2.0
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx2048m -Xms1024m -XX:MaxMetaspaceSize=512m -Djenkins.model.Jenkins.slaveAgentPort=50000 -Dhudson.model.AbstractCIBase.timeout=1800 -Dhudson.remoting.Launcher.pingIntervalSec=300
      # OpenProject configuration for feature branch validation (replacement for Jira)
      - OPENPROJECT_URL=${OPENPROJECT_URL:-http://openproject:80}
      - OPENPROJECT_API_KEY=${OPENPROJECT_API_KEY:-}
      # Legacy JIRA variables (for migration period - can be removed after migration)
      - JIRA_URL=${OPENPROJECT_URL:-http://openproject:80}
      - JIRA_USER=${OPENPROJECT_USER:-admin}
      - JIRA_API_TOKEN=${OPENPROJECT_API_KEY:-}
    volumes:
      - ../storage-infra/jenkins/data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for docker build
      - ${HOME}/.kube:/root/.kube  # Kubernetes config for kubectl access
      - ../../TradingPythonAgent:/workspace/trading-agent:ro  # Mount TradingPythonAgent for wheel access
      - ..:/var/jenkins_home/workspace/infra-platform:ro  # Mount infra-platform repo so ../infra-platform works from workspace (relative path)
    networks:
      - monitoring
    restart: unless-stopped
    user: root  # Needed for Docker socket access
    entrypoint: >
      bash -c "
        # Update kubeconfig to use host.docker.internal for localhost connections (Mac Docker Desktop)
        # Tools (docker, kubectl, kind) are already pre-installed in the custom image
        if [ -f /root/.kube/config ] && command -v kubectl &> /dev/null; then
          # Backup original config
          cp /root/.kube/config /root/.kube/config.bak
          # Replace 127.0.0.1 and localhost with host.docker.internal
          # Use perl for better regex support (escape backslashes properly)
          perl -pi -e 's|https://127\.0\.0\.1:(\d+)|https://host.docker.internal:$1|g' /root/.kube/config || true
          perl -pi -e 's|https://localhost:(\d+)|https://host.docker.internal:$1|g' /root/.kube/config || true
          # For kind-trading-cluster context, ensure it uses host.docker.internal and skip TLS verify
          # Extract the port from the current server URL and update it
          if kubectl config view --context kind-trading-cluster --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null | grep -q '127.0.0.1\|localhost'; then
            SERVER_URL=\$$(kubectl config view --context kind-trading-cluster --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || echo '')
            if [ -n "\$${SERVER_URL}" ]; then
              # Extract port from URL (e.g., https://127.0.0.1:54242 -> 54242)
              PORT=\$$(echo "\$${SERVER_URL}" | sed -E 's|https?://[^:]+:([0-9]+).*|\1|')
              if [ -n "\$${PORT}" ]; then
                kubectl config set-cluster kind-trading-cluster --server=https://host.docker.internal:\$${PORT} --insecure-skip-tls-verify=true 2>/dev/null || true
              fi
            fi
          else
            # Just add insecure-skip-tls-verify if server already uses host.docker.internal
            kubectl config set-cluster kind-trading-cluster --insecure-skip-tls-verify=true 2>/dev/null || true
          fi
        fi
        # Start Jenkins with original entrypoint
        exec /usr/local/bin/jenkins.sh
      "

  # Local Docker Registry for base images
  registry:
    image: registry:2
    container_name: docker-registry
    ports:
      - "5001:5000"  # Use 5001 on host to avoid conflict with macOS Control Center
    environment:
      # Allow deletion of images (useful for cleanup)
      - REGISTRY_STORAGE_DELETE_ENABLED=true
      # Storage backend: filesystem (local storage)
      - REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY=/var/lib/registry
    volumes:
      - ../storage-infra/registry/data:/var/lib/registry
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Portainer - Docker Management UI
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../storage-infra/portainer/data:/data
    networks:
      - monitoring
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock

networks:
  monitoring:
    driver: bridge
