# Kubernetes Dashboard
# Note: Kubernetes Dashboard runs in the kind cluster, accessed via kubectl proxy
# This nginx config proxies to a local kubectl proxy running on port 8001
server {
    listen 80;
    server_name kubernetes-dashboard.local.info;
    
    resolver 127.0.0.11 valid=30s;

    location / {
        set $backend "http://host.docker.internal:8001";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }
}
