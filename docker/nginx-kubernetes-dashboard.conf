# Kubernetes Dashboard
# Note: Kubernetes Dashboard runs in the kind cluster, accessed via kubectl proxy
# This nginx config proxies to a local kubectl proxy running on port 8001
# Requires: kubectl proxy --port=8001 must be running on the host
server {
    listen 80;
    server_name kubernetes-dashboard.local.info;
    
    resolver 127.0.0.11 valid=30s;

    # Dashboard proxy path prefix
    set $dashboard_path "/api/v1/namespaces/kubernetes-dashboard/services/https:kubernetes-dashboard:/proxy";
    
    # Proxy ALL requests to the Kubernetes Dashboard
    # The dashboard makes API calls to /api/v1/... which also need to go through the dashboard proxy
    location / {
        set $backend "http://host.docker.internal:8001";
        
        # Rewrite all paths to include the dashboard proxy path
        rewrite ^(.*)$ $dashboard_path$1 break;
        
        proxy_pass $backend;
        # Use localhost for Host header since kubectl proxy expects it
        proxy_set_header Host "localhost:8001";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Use HTTP/1.1 for better compatibility
        proxy_http_version 1.1;
        
        # Timeouts
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
        
        # Allow large request bodies for API calls
        client_max_body_size 50M;
        
        # Buffer settings for better compatibility
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
