# TCP proxy for PostgreSQL – six separate servers, one per logical server (see gateway/README.md).
# Each port proxies to its own Postgres container.
# Included from nginx.conf stream { } block.

upstream postgres_pma_dev  { server postgres-pma-dev:5432; }
upstream postgres_pma_test { server postgres-pma-test:5432; }
upstream postgres_pma_prod { server postgres-pma-prod:5432; }
upstream postgres_ta_dev   { server postgres-ta-dev:5432; }
upstream postgres_ta_test  { server postgres-ta-test:5432; }
upstream postgres_ta_prod  { server postgres-ta-prod:5432; }

# PredictionMarketsAgent
# dev
server {
    listen 54321;
    proxy_pass postgres_pma_dev;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}
# test
server {
    listen 54322;
    proxy_pass postgres_pma_test;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}
# prod
server {
    listen 54323;
    proxy_pass postgres_pma_prod;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}

# TradingAgent
# dev
server {
    listen 54324;
    proxy_pass postgres_ta_dev;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}
# test
server {
    listen 54325;
    proxy_pass postgres_ta_test;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}
# prod
server {
    listen 54326;
    proxy_pass postgres_ta_prod;
    proxy_connect_timeout 10s;
