# Kubeflow Pipelines UI
# Note: Kubeflow Pipelines UI runs in Kubernetes, accessed via kubectl port-forward
# This nginx config proxies to a local port-forward running on port 8081
# Requires: kubectl port-forward -n kubeflow svc/ml-pipeline-ui 8081:80 must be running
server {
    listen 80;
    server_name kubeflow.local.info;
    
    resolver 127.0.0.11 valid=30s;

    location / {
        set $backend "http://host.docker.internal:8081";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 5;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
        
        # Allow large request bodies
        client_max_body_size 50M;
        
        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Error handling - show clear message if backend is not available
        proxy_intercept_errors on;
        error_page 502 503 504 = @kubeflow_error;
        
        # Handle 404s for SPA routing - try the request, but if it fails, proxy to root
        # This allows client-side routing to work
        proxy_next_upstream error timeout http_404;
    }
    
    location @kubeflow_error {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><title>Kubeflow Not Available</title></head><body><h1>Kubeflow Pipelines UI Not Available</h1><p>Kubeflow port-forward is not running.</p><p>To start it, run:</p><pre>kubectl port-forward -n kubeflow svc/ml-pipeline-ui 8081:80</pre><p>Or install Kubeflow first (see kubernetes/QUICK_START.md)</p></body></html>';
    }
}
