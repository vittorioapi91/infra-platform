# Kubernetes Dashboard
# Proxies HTTP on kubernetes-dashboard.local.info to HTTPS on kubernetes-dashboard-port-forward:8001
server {
    listen 80;
    server_name kubernetes-dashboard.local.info;

    charset utf-8;

    resolver 127.0.0.11 valid=30s;

    error_page 502 503 504 /kubernetes-dashboard-unavailable.html;

    location = /kubernetes-dashboard-unavailable.html {
        root /etc/nginx/kubernetes-dashboard-static;
        internal;
        default_type text/html;
        charset utf-8;
    }

    location / {
        set $backend "https://kubernetes-dashboard-port-forward:8001";
        proxy_pass $backend;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        proxy_set_header Host "localhost:8001";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;

        client_max_body_size 50M;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
