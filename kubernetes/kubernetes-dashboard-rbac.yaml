# Local dev RBAC for Kubernetes Dashboard with --enable-skip-login.
# Skip-login uses the dashboard pod service account (not a bearer token), so that SA
# needs cluster read access. Safe for kind trading-cluster only.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-dashboard-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard
    namespace: kubernetes-dashboard
