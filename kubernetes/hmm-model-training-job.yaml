apiVersion: batch/v1
kind: Job
metadata:
  name: hmm-model-calibration
  namespace: trading-monitoring
  labels:
    app: hmm-model
    component: training
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: hmm-model
        component: training
    spec:
      restartPolicy: Never
      containers:
      - name: model-training
        image: hmm-model-training:latest
        imagePullPolicy: Never
        command: ["/bin/bash"]
        args:
          - -c
          - |
            python -m trading_agent.macro.main \
              --series-ids ${SERIES_IDS} \
              --start-date ${START_DATE} \
              --end-date ${END_DATE} \
              --feature-method ${FEATURE_METHOD} \
              --n-regimes ${N_REGIMES} \
              --random-state ${RANDOM_STATE} \
              --num-steps ${NUM_STEPS} \
              --mlflow-tracking-uri ${MLFLOW_TRACKING_URI} \
              --experiment-name ${EXPERIMENT_NAME} \
              --skip-prometheus
        env:
          - name: SERIES_IDS
            value: "GDP CPIAUCSL FEDFUNDS"
          - name: START_DATE
            value: "2000-01-01"
          - name: END_DATE
            value: ""
          - name: FEATURE_METHOD
            value: "pct_change"
          - name: N_REGIMES
            value: "4"
          - name: RANDOM_STATE
            value: "42"
          - name: NUM_STEPS
            value: "1000"
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: user
                optional: true
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: password
          - name: POSTGRES_HOST
            value: "postgres.dev.local.info"
          - name: POSTGRES_PORT
            value: "54324"
          - name: ENV
            value: "dev"
          - name: IFP_MLFLOW_PATH
            value: "/workspace/mlflow"
          - name: MLFLOW_TRACKING_URI
            value: "http://mlflow.trading-monitoring.svc.cluster.local:5000"
          - name: EXPERIMENT_NAME
            value: "macro-cycle-hmm"
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hmm-training-config
  namespace: trading-monitoring
  labels:
    app: hmm-model
    component: training
data:
  default_series_ids: "GDP CPIAUCSL FEDFUNDS"
  default_start_date: "2000-01-01"
  default_feature_method: "pct_change"
  default_n_regimes: "4"
  default_random_state: "42"
  default_num_steps: "1000"
