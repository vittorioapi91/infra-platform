# TCP proxy for PostgreSQL – TradingAgent dev/test/prod (see gateway/README.md).
# Each port proxies to its own Postgres container.
# Included from nginx.conf stream { } block.

upstream postgres_dev   { server postgres-dev:5432; }
upstream postgres_test  { server postgres-test:5432; }
upstream postgres_prod  { server postgres-prod:5432; }

# postgres.dev.local.info, postgres.test.local.info, postgres.prod.local.info
# dev
server {
    listen 54324;
    proxy_pass postgres_dev;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}
# test
server {
    listen 54325;
    proxy_pass postgres_test;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}
# prod
server {
    listen 54326;
    proxy_pass postgres_prod;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    proxy_responses 1;
    error_log /var/log/nginx/postgres_stream_error.log;
}
