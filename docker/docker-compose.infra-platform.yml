  # Six separate PostgreSQL servers – one per logical server (PMA dev/test/prod, TA dev/test/prod).
  # Accessible via nginx TCP proxy: postgres.{env}.{agent}.local.info:5432x (see gateway/nginx/nginx-postgres.stream.conf)

  # Postgres data: bind-mounted from <repo>/storage-postgresql/{dev|test|prod} (each may be a symlink to SSD). TA and PMA share these 3 instances.
  # PG18+ uses /var/lib/postgresql (data under 18/docker inside the mount). See docker/upgrade-postgres-to-18.sh.
  postgres-dev:
    image: pgvector/pgvector:pg18
    container_name: postgres-dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
    ports:
      - "54321:5432"
    volumes:
      - ../storage-postgresql/dev:/var/lib/postgresql
      - ./init-pg-datalake-dev.sql:/docker-entrypoint-initdb.d/01-datalake-dev.sql:ro
    networks:
      - monitoring
    restart: unless-stopped

