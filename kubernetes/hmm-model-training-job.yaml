apiVersion: batch/v1
kind: Job
metadata:
  name: hmm-model-calibration
  namespace: default
  labels:
    app: hmm-model
    component: training
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: hmm-model
        component: training
    spec:
      restartPolicy: Never
      containers:
      - name: model-training
        image: hmm-model-training:latest
        imagePullPolicy: Never
        command: ["/bin/bash"]
        args:
          - -c
          - |
            python -m trading_agent.macro.training_script \
              --series-ids ${SERIES_IDS} \
              --start-date ${START_DATE} \
              --end-date ${END_DATE} \
              --feature-method ${FEATURE_METHOD} \
              --n-regimes ${N_REGIMES} \
              --random-state ${RANDOM_STATE} \
              --num-steps ${NUM_STEPS} \
              --mlflow-tracking-uri ${MLFLOW_TRACKING_URI} \
              --experiment-name ${EXPERIMENT_NAME} \
              --skip-prometheus
        env:
          - name: SERIES_IDS
            value: "GDP CPIAUCSL FEDFUNDS"
          - name: START_DATE
            value: "2000-01-01"
          - name: END_DATE
            value: ""
          - name: FEATURE_METHOD
            value: "hp_cycle"
          - name: N_REGIMES
            value: "4"
          - name: RANDOM_STATE
            value: "42"
          - name: NUM_STEPS
            value: "1000"
          - name: POSTGRES_USER
            value: "dev.user"
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: password
                optional: true
          - name: POSTGRES_HOST
            value: "host.docker.internal"
          - name: POSTGRES_PORT
            value: "54324"
          - name: ENV
            value: "dev"
          - name: DBT_TARGET
            value: "dev"
          - name: MLFLOW_TRACKING_URI
            value: "http://host.docker.internal:55000"
          - name: EXPERIMENT_NAME
            value: "macro-cycle-hmm"
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
