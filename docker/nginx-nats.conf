# NATS Server - Web GUI via monitoring endpoint
# NATS monitoring endpoint provides HTML views for server stats, connections, subscriptions, etc.
# Use Docker's internal DNS resolver for dynamic resolution
server {
    listen 80;
    server_name nats.local.info;

    resolver 127.0.0.11 valid=30s;

    # Root redirect to monitoring endpoint
    location = / {
        return 301 /varz;
    }

    # Proxy all requests to NATS monitoring endpoint
    location / {
        set $backend "http://nats:8222";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }

    # Available monitoring endpoints:
    # /varz - Server information and statistics
    # /connz - Connection details
    # /subsz - Subscription details
    # /routez - Cluster routing information
    # /jsz - JetStream statistics
    # /healthz - Health check
}
