services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../storage-infra/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=2014
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
    volumes:
      - ../storage-infra/grafana/data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # MLflow tracking — per-env servers (see mlflow/README.md)
  mlflow-dev:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    container_name: mlflow-dev
    ports:
      - "55000:5000"
    volumes:
      - ../storage-infra/mlflow/dev/data:/mlflow
    command:
      - mlflow
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
    networks:
      - monitoring
    restart: unless-stopped

  mlflow-test:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    container_name: mlflow-test
    ports:
      - "55001:5000"
    volumes:
      - ../storage-infra/mlflow/test/data:/mlflow
    command:
      - mlflow
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
    networks:
      - monitoring
    restart: unless-stopped

  mlflow-prod:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    container_name: mlflow-prod
    ports:
      - "55002:5000"
    volumes:
      - ../storage-infra/mlflow/prod/data:/mlflow
    command:
      - mlflow
      - server
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
    networks:
      - monitoring
    restart: unless-stopped

  # Feast – per-env repos (parquet + registry + online store); see feast/README.md
  feast-dev:
    image: python:3.11-slim
    container_name: feast-dev
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ../feast:/workspace/feast
      - ../storage-infra/feast/dev/data:/workspace/feast/repos/dev/data
      - ./feast-ui-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - FEAST_REPO_PATH=/workspace/feast/repos/dev
      - ENV=dev
      - FEAST_UI_PORT=8888
    ports:
      - "8890:8888"
    networks:
      - monitoring
    restart: unless-stopped

  feast-test:
    image: python:3.11-slim
    container_name: feast-test
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ../feast:/workspace/feast
      - ../storage-infra/feast/test/data:/workspace/feast/repos/test/data
      - ./feast-ui-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - FEAST_REPO_PATH=/workspace/feast/repos/test
      - ENV=test
      - FEAST_UI_PORT=8888
    ports:
      - "8891:8888"
    networks:
      - monitoring
    restart: unless-stopped

  feast-prod:
    image: python:3.11-slim
    container_name: feast-prod
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ../feast:/workspace/feast
      - ../storage-infra/feast/prod/data:/workspace/feast/repos/prod/data
      - ./feast-ui-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - FEAST_REPO_PATH=/workspace/feast/repos/prod
      - ENV=prod
      - FEAST_UI_PORT=8888
    ports:
      - "8892:8888"
    networks:
      - monitoring
    restart: unless-stopped

  # dbt – feature engineering into feast schema on postgres-* (see dbt/README.md)
  dbt-dev:
    image: python:3.11-slim
    container_name: dbt-dev
    working_dir: /workspace/dbt/feast_features
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      - DBT_PROFILES_DIR=/workspace/dbt
      - DBT_TARGET=dev
      - ENV=dev
      - FEAST_REPO_PATH=/workspace/feast/repos/dev
      - MLFLOW_TRACKING_URI=http://mlflow-dev:5000
      - POSTGRES_HOST=postgres-dev
      - POSTGRES_USER=dev.user
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
      - DBT_DOCS_PORT=8880
    volumes:
      - ../dbt:/workspace/dbt
      - ../feast:/workspace/feast
      - ../storage-infra/dbt/dev/target:/workspace/dbt/feast_features/target
      - ../storage-infra/dbt/dev/logs:/workspace/dbt/feast_features/logs
      - ../storage-infra/feast/dev/data:/workspace/feast/repos/dev/data
      - ../kubernetes/wheels:/workspace/infra-platform/kubernetes/wheels:ro
      - ../../TradingPythonAgent:/workspace/TradingPythonAgent:ro
      - ../../infra-data-pipelines/src/postgres_connection.py:/workspace/dbt/postgres_connection.py:ro
      - ./dbt-docs-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "8880:8880"
    networks:
      - monitoring
    depends_on:
      - postgres-dev
    restart: unless-stopped

  dbt-test:
    image: python:3.11-slim
    container_name: dbt-test
    working_dir: /workspace/dbt/feast_features
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      - DBT_PROFILES_DIR=/workspace/dbt
      - DBT_TARGET=test
      - ENV=test
      - FEAST_REPO_PATH=/workspace/feast/repos/test
      - MLFLOW_TRACKING_URI=http://mlflow-test:5000
      - POSTGRES_HOST=postgres-test
      - POSTGRES_USER=test.user
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
      - DBT_DOCS_PORT=8880
    volumes:
      - ../dbt:/workspace/dbt
      - ../feast:/workspace/feast
      - ../storage-infra/dbt/test/target:/workspace/dbt/feast_features/target
      - ../storage-infra/dbt/test/logs:/workspace/dbt/feast_features/logs
      - ../storage-infra/feast/test/data:/workspace/feast/repos/test/data
      - ../kubernetes/wheels:/workspace/infra-platform/kubernetes/wheels:ro
      - ../../TradingPythonAgent:/workspace/TradingPythonAgent:ro
      - ../../infra-data-pipelines/src/postgres_connection.py:/workspace/dbt/postgres_connection.py:ro
      - ./dbt-docs-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "8881:8880"
    networks:
      - monitoring
    depends_on:
      - postgres-test
    restart: unless-stopped

  dbt-prod:
    image: python:3.11-slim
    container_name: dbt-prod
    working_dir: /workspace/dbt/feast_features
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      - DBT_PROFILES_DIR=/workspace/dbt
      - DBT_TARGET=prod
      - ENV=prod
      - FEAST_REPO_PATH=/workspace/feast/repos/prod
      - MLFLOW_TRACKING_URI=http://mlflow-prod:5000
      - POSTGRES_HOST=postgres-prod
      - POSTGRES_USER=prod.user
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-2014}
      - DBT_DOCS_PORT=8880
    volumes:
      - ../dbt:/workspace/dbt
      - ../feast:/workspace/feast
      - ../storage-infra/dbt/prod/target:/workspace/dbt/feast_features/target
      - ../storage-infra/dbt/prod/logs:/workspace/dbt/feast_features/logs
      - ../storage-infra/feast/prod/data:/workspace/feast/repos/prod/data
      - ../kubernetes/wheels:/workspace/infra-platform/kubernetes/wheels:ro
      - ../../TradingPythonAgent:/workspace/TradingPythonAgent:ro
      - ../../infra-data-pipelines/src/postgres_connection.py:/workspace/dbt/postgres_connection.py:ro
      - ./dbt-docs-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "8882:8880"
    networks:
      - monitoring
    depends_on:
      - postgres-prod
    restart: unless-stopped

  # Airflow DEV (for dev/* branches)
  airflow-dev:
    image: apache/airflow:3.2.2
    container_name: airflow-dev
    ports:
      - "8082:8080"
    mem_limit: 4g
    mem_reservation: 1g
    cpus: 2.0
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      # Use PostgreSQL instead of SQLite for better performance and concurrency
      # Connect directly to postgres-dev; database datalake, schema postgres (nginx proxy used for host access)
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres-dev:5432/datalake?options=-c%20search_path%3Dpostgres
      # Use FAB auth manager so 'airflow users create' controls login
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-fab apache-airflow-providers-standard docker
      # Stable secrets so FAB/CSRF sessions survive restarts (dev only)
      - AIRFLOW__API__SECRET_KEY=dev-airflow-api-secret-key
      - AIRFLOW__WEBSERVER__SECRET_KEY=dev-airflow-fab-secret-key
      - AIRFLOW__WEBSERVER__RATELIMIT_STORAGE_URI=redis://redis:6379/1
      # Use 1 worker for webserver to reduce resource contention (scheduler runs separately)
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=30
      - AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC=5
      - AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC=5
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=180
      # Display environment badge in Airflow UI title
      - AIRFLOW__API__INSTANCE_NAME=Airflow (DEV)
      - AIRFLOW__API__EXPOSE_CONFIG=True
      # Public URLs (avoid stale airflow.cfg base_url=http://localhost:8080 redirects)
      - AIRFLOW__API__BASE_URL=http://airflow.local.dev.info
      - AIRFLOW__WEBSERVER__BASE_URL=http://airflow.local.dev.info
      - AIRFLOW__CLI__ENDPOINT_URL=http://airflow.local.dev.info
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
      - FORWARDED_ALLOW_IPS=*
      # Make custom operators available inside the container
      - PYTHONPATH=/opt/airflow/operators
      # Set environment for config.py and wheel selection
      - AIRFLOW_ENV=dev
      - GIT_BRANCH=${GIT_BRANCH:-dev}
      # PostgreSQL (direct to postgres-dev; database datalake, default schema postgres)
      - POSTGRES_HOST=postgres-dev
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=datalake
      - POSTGRES_SCHEMA=postgres
    volumes:
      - ../storage-infra/airflow/dev/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/airflow_local_settings.py:/opt/airflow-settings/airflow_local_settings.py:ro
      # Mount custom operators package
      - ../airflow/operators:/opt/airflow/operators
      # Wheels and workspace in storage-infra (not versioned)
      - ../storage-infra/airflow/dev/wheels:/opt/airflow/wheels
      - ../storage-infra/airflow/dev/workspace:/opt/airflow/workspace
      # DAGs stay versioned in airflow
      - ../airflow/dev/dags:/opt/airflow/dags
      # Mount install-idp-wheel.sh script for automatic wheel installation
      - ../airflow/install-idp-wheel.sh:/opt/airflow/install-idp-wheel.sh:ro
      # Mount create-dag-imports.sh script for creating single DAG import file
      - ../airflow/create-dag-imports.sh:/opt/airflow/create-dag-imports.sh:ro
      # Mount infra-data-pipelines to access built wheels and allow writing data files
      # (writable so DAGs can write to src/fundamentals/edgar/, etc.)
      - ../../infra-data-pipelines:/workspace/infra-data-pipelines
      # TradingPythonAgent DAG source + wheel fallback (dbt orchestration, modeling)
      - ../../TradingPythonAgent:/workspace/TradingPythonAgent
      # Bind-mount storage-other-data from host (<repo>/storage-other-data); legacy compatibility mount. Canonical path is TRADING_AGENT_STORAGE (/Volumes/storage-volume/storage/{env})
      - ../storage-other-data:/workspace/storage-other-data
      # Canonical TA storage (TRADING_AGENT_STORAGE); must match host path in .env.{env}
      - /Volumes/storage-volume:/Volumes/storage-volume
      # Mount infra-platform root to access .env.tradingAgent.{env} files (read-only)
      - ..:/workspace/infra-platform:ro
      # Mount Docker socket to enable container restart from within
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../storage-infra/airflow/dev/db:/opt/airflow
    command: >
      bash -c "
        mkdir -p /opt/airflow/config &&
        cp /opt/airflow-settings/airflow_local_settings.py /opt/airflow/config/airflow_local_settings.py &&
        # Run install-idp-wheel.sh automatically to copy wheels from infra-data-pipelines/dist/ to /opt/airflow/wheels/
        ENV=dev
        echo \"Running install-idp-wheel.sh to copy wheels from infra-data-pipelines/dist/...\"
        # Set IDP_ROOT environment variable for install-idp-wheel.sh
        export IDP_ROOT=/workspace/infra-data-pipelines
        # Run install-idp-wheel.sh (will copy wheel if it exists in infra-data-pipelines/dist/)
        bash /opt/airflow/install-idp-wheel.sh \$${ENV} 2>&1 || {
          echo \"Warning: install-idp-wheel.sh failed or no wheel found in infra-data-pipelines/dist/\"
          echo \"  This is OK if wheels are already in /opt/airflow/wheels/ or will be added manually\"
        }
        # Install environment-specific wheel (dev)
        # Wheels are now named with base package name (no env suffix): idp-*.whl
        # Find the latest version by sorting all matching wheels by version (-V) and taking the last one
        WHEEL_FILE=\$$(ARCH=\$$(uname -m); if [ \"\$${ARCH}\" = \"aarch64\" ] || [ \"\$${ARCH}\" = \"arm64\" ]; then find /opt/airflow/wheels -name 'idp-*aarch64*.whl' 2>/dev/null | sort -V | tail -n 1; else find /opt/airflow/wheels -name 'idp-*x86_64*.whl' 2>/dev/null | sort -V | tail -n 1; fi)
        if [ -z \"\$${WHEEL_FILE}\" ]; then
          WHEEL_FILE=\$$(find /opt/airflow/wheels -name "idp-*.whl" 2>/dev/null | sort -V | tail -n 1)
        fi
        if [ -n \"\$${WHEEL_FILE}\" ]; then
          echo \"Found wheel: \$$(basename \$${WHEEL_FILE})\"
          # Extract package name from wheel file
          PACKAGE_NAME=\$$(python3 -c \"import zipfile,re;f=zipfile.ZipFile('\$${WHEEL_FILE}');m=[n for n in f.namelist() if '.dist-info/METADATA' in n];metadata=f.read(m[0]).decode('utf-8') if m else '';r=re.search(r'^Name:\\s*(.+)$',metadata,re.MULTILINE) if metadata else None;print(r.group(1).strip() if r else 'idp');f.close()\" 2>/dev/null || echo \"idp\")
          
          # Workspace directory: /opt/airflow/workspace/{package_name}-workspace (mounted from storage-infra/airflow/dev/workspace)
          WORKSPACE_DIR=\"/opt/airflow/workspace/\$${PACKAGE_NAME}-workspace\"
          # Installation directory: workspace/{package_name}-workspace (wheel already contains package structure)
          INSTALL_DIR=\"\$${WORKSPACE_DIR}\"
          
          # Determine environment file name for checking
          ENV_FOR_ENV_FILE=\$${ENV}
          
          # Check if package is already installed or installation is in progress
          # Since wheel doesn't change, we only need to install once
          INSTALL_LOCK=\"\$${WORKSPACE_DIR}/.wheel_install.lock\"
          ENV_FILE_DEST=\"\$${WORKSPACE_DIR}/.env.\$${ENV_FOR_ENV_FILE}\"
          NEEDS_INSTALL=false
          # Compare installed package version with the latest wheel before skipping reinstall
          DIST_INFO=\$$(find \"\$${WORKSPACE_DIR}\" -maxdepth 1 -type d -name \"\$${PACKAGE_NAME}*.dist-info\" 2>/dev/null | head -1)
          INSTALLED_VERSION=\"\"
          if [ -n \"\$${DIST_INFO}\" ] && [ -f \"\$${DIST_INFO}/METADATA\" ]; then
            INSTALLED_VERSION=\$$(grep -E \"^Version:\" \"\$${DIST_INFO}/METADATA\" 2>/dev/null | sed 's/Version:[[:space:]]*//' | head -1 || echo \"\")
          fi
          WHEEL_VERSION=\$$(python3 -c \"import zipfile,re;f=zipfile.ZipFile('\$${WHEEL_FILE}');m=[n for n in f.namelist() if n.endswith('.dist-info/METADATA')];metadata=f.read(m[0]).decode('utf-8') if m else '';r=re.search(r'^Version:\\\\s*(.+)$',metadata,re.MULTILINE) if metadata else None;print(r.group(1).strip() if r else '');f.close()\" 2>/dev/null || echo \"\")
          if [ -f \"\$${INSTALL_LOCK}\" ]; then
            LOCK_AGE=\$$(find \"\$${INSTALL_LOCK}\" -mmin +30 2>/dev/null && echo \"old\" || echo \"recent\")
            if [ \"\$${LOCK_AGE}\" = \"old\" ]; then
              rm -f \"\$${INSTALL_LOCK}\"
              echo \"Stale lock file removed. Will install wheel \$$(basename \$${WHEEL_FILE})\"
              NEEDS_INSTALL=true
            else
              echo \"Installation in progress (lock file exists). Skipping installation.\"
              NEEDS_INSTALL=false
            fi
          elif [ -z \"\$${INSTALLED_VERSION}\" ]; then
            echo \"Package not installed. Will install wheel \$$(basename \$${WHEEL_FILE})\"
            NEEDS_INSTALL=true
          elif [ \"\$${INSTALLED_VERSION}\" != \"\$${WHEEL_VERSION}\" ]; then
            echo \"Upgrading package \$${INSTALLED_VERSION} -> \$${WHEEL_VERSION} from \$$(basename \$${WHEEL_FILE})\"
            NEEDS_INSTALL=true
          elif [ -n \"\$${DIST_INFO}\" ] && [ \"\$${WHEEL_FILE}\" -nt \"\$${DIST_INFO}/METADATA\" ]; then
            echo \"Wheel is newer than installed package (version \$${INSTALLED_VERSION}). Reinstalling.\"
            NEEDS_INSTALL=true
          else
            echo \"Package already installed (version \$${INSTALLED_VERSION}). Skipping installation.\"
            NEEDS_INSTALL=false
          fi
          
          if [ \"\$${NEEDS_INSTALL}\" = \"true\" ]; then
            echo \"Installing wheel: \$$(basename \$${WHEEL_FILE})\"
            echo \"Workspace directory: \$${WORKSPACE_DIR}\"
            echo \"Package installation directory: \$${INSTALL_DIR}\"
            # Create workspace directory if it doesn't exist
            mkdir -p \"\$${WORKSPACE_DIR}\"
            # Create lock file to indicate installation is in progress
            touch \"\$${INSTALL_LOCK}\"
            rm -rf \"\$${WORKSPACE_DIR}/idp\" \"\$${WORKSPACE_DIR}/\$${PACKAGE_NAME}\"*.dist-info
            # Only clean up if workspace is truly empty (not if it has files from previous install)
            if [ \"\$$(ls -A \$${WORKSPACE_DIR} 2>/dev/null | wc -l)\" -le 2 ]; then
              echo \"Workspace is empty. Proceeding with installation.\"
            else
              echo \"Workspace has files. Keeping existing installation and updating.\"
            fi
            # Step 1: Install dependencies first to workspace root
            echo \"Step 1: Installing dependencies to workspace...\"
            # Extract dependencies from wheel metadata and write to temp file (handles long lists better)
            # Pass WHEEL_FILE directly to Python using command-line argument approach
            python3 -c \"import zipfile,re,sys;wheel_file='\$${WHEEL_FILE}';f=zipfile.ZipFile(wheel_file) if wheel_file else None;m=[n for n in f.namelist() if 'METADATA' in n or n.endswith('.dist-info/METADATA')] if f else [];metadata=f.read(m[0]).decode('utf-8') if m else '';deps=[line.replace('Requires-Dist: ','').split(';')[0].strip().split('(')[0].strip() for line in metadata.split('\\n') if line.startswith('Requires-Dist:') and 'extra ==' not in line] if metadata else [];print('\\n'.join(deps));f.close() if f else None\" > /tmp/dependencies.txt 2>/dev/null || echo \"\" > /tmp/dependencies.txt
            if [ -s /tmp/dependencies.txt ]; then
              DEP_COUNT=\$$(wc -l < /tmp/dependencies.txt | tr -d ' ')
              echo \"Found \$${DEP_COUNT} dependencies to install\"
              echo \"Installing dependencies to workspace...\"
              timeout 600 pip install --no-cache-dir --target \"\$${WORKSPACE_DIR}\" -r /tmp/dependencies.txt 2>&1 | grep -E \"(Installing|Successfully|ERROR|error|Failed|Warning:|already satisfied)\" | tail -10 || {
                echo \"Warning: Some dependencies failed to install, continuing with wheel installation\"
              }
              echo \"✓ Dependencies installation completed\"
            else
              echo \"No dependencies found in wheel metadata\"
            fi
            rm -f /tmp/dependencies.txt
            # Step 2: Install wheel package to workspace root (wheel already contains package structure)
            echo \"Step 2: Installing wheel package to \$${INSTALL_DIR}...\"
            mkdir -p \"\$${INSTALL_DIR}\"
            timeout 300 pip install --quiet --no-cache-dir --target \"\$${INSTALL_DIR}\" --no-deps \$${WHEEL_FILE} 2>&1 || {
              echo \"Warning: Failed to install wheel \$$(basename \$${WHEEL_FILE}) to \$${INSTALL_DIR}, continuing anyway\"
            }
            echo \"✓ Wheel installation completed for: \$$(basename \$${WHEEL_FILE})\"
            # Remove lock file and copy .env file to workspace root so config.py can find it
            rm -f \"\$${INSTALL_LOCK}\"
            # .env files are now in infra-platform root as .env.tradingAgent.{env}
            # ENV_FOR_ENV_FILE already set above
            # Primary: Try infra-platform root (new location)
            ENV_FILE_SOURCE=\"/workspace/infra-platform/.env.tradingAgent.\$${ENV_FOR_ENV_FILE}\"
            ENV_FILE_DEST=\"\$${WORKSPACE_DIR}/.env.\$${ENV_FOR_ENV_FILE}\"
            if [ ! -f \"\$${ENV_FILE_SOURCE}\" ]; then
              # Fallback: Try infra-data-pipelines location (legacy)
              ENV_FILE_SOURCE=\"/workspace/infra-data-pipelines/.env.\$${ENV_FOR_ENV_FILE}\"
            fi
            if [ -f \"\$${ENV_FILE_SOURCE}\" ]; then
              echo \"Copying .env file to workspace root...\"
              cp \"\$${ENV_FILE_SOURCE}\" \"\$${ENV_FILE_DEST}\"
              echo \"✓ Copied .env.\$${ENV_FOR_ENV_FILE} to workspace root\"
            else
              echo \"Warning: .env file not found at \$${ENV_FILE_SOURCE}\"
            fi
            # Run create-dag-imports.sh to create single DAG import file
            echo \"Running create-dag-imports.sh to create idp_dags.py...\"
            # Pass package name to create-dag-imports.sh
            bash /opt/airflow/create-dag-imports.sh \$${ENV} \$${PACKAGE_NAME} 2>&1 || {
              echo \"Warning: create-dag-imports.sh failed or DAGs not found in installed wheel\"
            }
            else
              # Even if wheel isn't installed, ensure .env file is copied to workspace root
              # .env files are now in infra-platform root as .env.tradingAgent.{env}
              ENV_FOR_ENV_FILE=\$${ENV}
              # Primary: Try infra-platform root (new location)
              ENV_FILE_SOURCE=\"/workspace/infra-platform/.env.tradingAgent.\$${ENV_FOR_ENV_FILE}\"
              ENV_FILE_DEST=\"\$${WORKSPACE_DIR}/.env.\$${ENV_FOR_ENV_FILE}\"
              if [ ! -f \"\$${ENV_FILE_SOURCE}\" ]; then
                # Fallback: Try infra-data-pipelines location (legacy)
                ENV_FILE_SOURCE=\"/workspace/infra-data-pipelines/.env.\$${ENV_FOR_ENV_FILE}\"
              fi
              if [ -f \"\$${ENV_FILE_SOURCE}\" ] && [ ! -f \"\$${ENV_FILE_DEST}\" ]; then
                echo \"Copying .env file to workspace root...\"
                cp \"\$${ENV_FILE_SOURCE}\" \"\$${ENV_FILE_DEST}\"
                echo \"✓ Copied .env.\$${ENV_FOR_ENV_FILE} to workspace root\"
              fi
              # Even if wheel isn't installed, run create-dag-imports.sh in case DAGs need updating
              echo \"Running create-dag-imports.sh to ensure DAGs are up to date...\"
              bash /opt/airflow/create-dag-imports.sh \$${ENV} \$${PACKAGE_NAME} 2>&1 || {
                echo \"Warning: create-dag-imports.sh failed or DAGs not found\"
              }
            fi
          
          # Store wheel info for plugin display
          export WHEEL_VERSION=\"\$$(basename \$${WHEEL_FILE})\"
          export INSTALLED_WHEEL=\$$(basename \$${WHEEL_FILE})
        else
            echo \"Warning: No wheel found for environment \$${ENV}. Looking for idp-*.whl\"
          export WHEEL_VERSION=\"Not installed\"
        fi
        echo \"Running create-dag-imports.sh for trading_agent (dbt DAGs)...\"
        bash /opt/airflow/create-dag-imports.sh \$${ENV} trading_agent 2>&1 || {
          echo \"Warning: create-dag-imports.sh failed for trading_agent\"
        }
        # Install PostgreSQL client tools (pg_dump, pg_restore, psql) for backup DAGs
        if ! command -v pg_dump > /dev/null 2>&1; then
          echo \"Installing PostgreSQL client tools...\"
          apt-get update -qq > /dev/null 2>&1 && apt-get install -y -qq postgresql-client > /dev/null 2>&1 || {
            echo \"Warning: Failed to install PostgreSQL client tools. Backup DAGs may not work.\"
          }
        fi
        # Install critical project dependencies needed for DAGs (run in background, don't block)
        # Also install docker package for container reboot functionality
        python3 -m pip install --quiet tqdm pandas psycopg2-binary requests python-dotenv docker > /tmp/pip_install.log 2>&1 &
        # Start Airflow services immediately (dependencies will install in background)
        # Remove stale PID files if they exist
        rm -f /opt/airflow/airflow-api-server.pid /opt/airflow/airflow-scheduler.pid /opt/airflow/airflow-dag-processor.pid
        airflow db migrate &&
        # Only create admin user if it doesn't exist (check first to avoid resetting)
        airflow users list | grep -q 'admin' || airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password 2014 || true
        # Create vittorioapi user if it doesn't exist (persist across restarts)
        airflow users list | grep -q 'vittorioapi' || airflow users create --username vittorioapi --firstname Vittorio --lastname API --role Admin --email vittorioapi@example.com --password 2014 || true
        airflow api-server --port 8080 --proxy-headers &
        airflow scheduler &
        airflow dag-processor &
        exec airflow triggerer
      "
    networks:
      - monitoring
    restart: unless-stopped

