# TCP proxy for Doltgres – dev/test/prod (parallel to Postgres; see doltgres/README.md).
# Do not use proxy_responses 1 (breaks SCRAM auth for app users).

upstream doltgres_dev   { server doltgres-dev:5432; }
upstream doltgres_test  { server doltgres-test:5432; }
upstream doltgres_prod  { server doltgres-prod:5432; }

server {
    listen 54334;
    proxy_pass doltgres_dev;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    error_log /var/log/nginx/doltgres_stream_error.log;
}
server {
    listen 54335;
    proxy_pass doltgres_test;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    error_log /var/log/nginx/doltgres_stream_error.log;
}
server {
    listen 54336;
    proxy_pass doltgres_prod;
    proxy_connect_timeout 10s;
    proxy_timeout 3600s;
    error_log /var/log/nginx/doltgres_stream_error.log;
}
