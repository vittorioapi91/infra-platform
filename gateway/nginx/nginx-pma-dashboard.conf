# PMA (PredictionMarketsAgent) dashboard – HTTP reverse proxy.
# Routes predictionmarketsagent.local.info to the PMA dashboard (host.docker.internal:7567).
server {
    listen 80;
    server_name predictionmarketsagent.local.info;
    resolver 127.0.0.11 valid=30s;
    
    location / {
        set $backend "http://host.docker.internal:7567";
        proxy_pass $backend;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
