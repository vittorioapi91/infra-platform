# Airflow Dev
# Use Docker's internal DNS resolver for dynamic resolution
server {
    listen 80;
    server_name airflow.local.dev.info;
    
    resolver 127.0.0.11 valid=30s;

    location / {
        set $backend "http://airflow-dev:8080";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Airflow
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts - increased for slow Airflow responses
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # Buffering settings to handle large responses
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Error handling - show loading page if backend is not available
        proxy_intercept_errors on;
        error_page 502 503 504 = @airflow_dev_starting;
    }
    
    location @airflow_dev_starting {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><title>Airflow Dev - Starting</title><meta http-equiv="refresh" content="3"><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}.container{text-align:center;padding:40px}.spinner{border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{to{transform:rotate(360deg)}}.title{font-size:28px;font-weight:600;margin-bottom:10px}.message{font-size:16px;opacity:0.9;margin-bottom:20px}.env-badge{display:inline-block;background:#28a745;padding:6px 16px;border-radius:4px;font-weight:600;font-size:14px}</style></head><body><div class="container"><div class="spinner"></div><h1 class="title">Airflow Dev is Starting</h1><p class="message">Please wait while the container initializes...</p><span class="env-badge">DEV</span><p style="margin-top:30px;font-size:14px;opacity:0.7">This page will automatically refresh every 3 seconds</p></div></body></html>';
    }
}

