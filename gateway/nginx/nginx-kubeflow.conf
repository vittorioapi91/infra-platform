# Kubeflow Pipelines UI
# Proxies to kubeflow-port-forward compose sidecar.
# Direct access: http://localhost:8088
server {
    listen 80;
    server_name kubeflow.local.info;

    charset utf-8;

    resolver 127.0.0.11 valid=30s;

    error_page 502 503 504 /kubeflow-unavailable.html;

    location = /kubeflow-unavailable.html {
        root /etc/nginx/kubeflow-static;
        internal;
        default_type text/html;
        charset utf-8;
    }

    location / {
        set $backend "http://kubeflow-port-forward:8088";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 5;
        proxy_send_timeout 90;
        proxy_read_timeout 90;

        client_max_body_size 50M;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
