# Airflow Dev
# Use Docker's internal DNS resolver for dynamic resolution
server {
    listen 80;
    server_name airflow.local.dev.info;
    
    resolver 127.0.0.11 valid=30s;

    location / {
        set $backend "http://airflow-dev:8080";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Airflow
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts - increased for slow Airflow responses
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # Buffering settings to handle large responses
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

